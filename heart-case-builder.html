<!doctype html>
<html lang="sv">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Heart Case Builder</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
      body.heart-builder {
        margin: 0;
        font-family: "Segoe UI", Tahoma, sans-serif;
        background: #f8f8f7;
        color: #0f172a;
        padding: 20px;
        display: flex;
        justify-content: center;
      }

      .hb-wrap {
        width: min(1100px, 100%);
        display: grid;
        gap: 12px;
      }

      .hb-card {
        background: #fff;
        border: 1px solid rgba(15, 23, 42, 0.16);
        border-radius: 12px;
        padding: 14px;
        display: grid;
        gap: 10px;
      }

      .hb-head h1 {
        margin: 0;
        font-size: 1.4rem;
      }

      .hb-head p {
        margin: 6px 0 0;
        color: #64748b;
      }

      .hb-grid {
        display: grid;
        gap: 10px;
      }

      .hb-field {
        display: grid;
        gap: 6px;
      }

      .hb-field label {
        font-weight: 700;
      }

      .hb-field input[type="text"],
      .hb-field textarea,
      .hb-field select {
        width: 100%;
        border: 1px solid rgba(15, 23, 42, 0.2);
        border-radius: 8px;
        padding: 8px 10px;
        font: inherit;
      }

      .hb-field textarea {
        min-height: 70px;
        resize: vertical;
      }

      .hb-field textarea.code {
        min-height: 180px;
        font-family: Consolas, "Courier New", monospace;
        font-size: 0.9rem;
      }

      .hb-section {
        border: 1px solid rgba(15, 23, 42, 0.14);
        border-radius: 10px;
        padding: 10px;
        display: grid;
        gap: 10px;
      }

      .hb-section h2 {
        margin: 0;
        font-size: 1.05rem;
      }

      .hb-subbox {
        border: 1px solid rgba(15, 23, 42, 0.12);
        border-radius: 8px;
        padding: 10px;
        display: grid;
        gap: 8px;
        background: #fafbfc;
      }

      .hb-subbox h3 {
        margin: 0;
        font-size: 0.95rem;
      }

      .hb-row {
        display: grid;
        gap: 8px;
        grid-template-columns: 1fr 180px;
        align-items: end;
      }

      .hb-check {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 600;
      }

      .hb-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .hb-defib-settings {
        border: 1px solid rgba(28, 78, 135, 0.28);
        background: rgba(28, 78, 135, 0.05);
        border-radius: 10px;
        padding: 10px;
        display: grid;
        gap: 8px;
      }

      .hb-defib-settings h2 {
        margin: 0;
        font-size: 0.95rem;
      }

      .hb-seq-list {
        display: grid;
        gap: 8px;
      }

      .hb-seq-item {
        display: grid;
        grid-template-columns: 140px 1fr;
        gap: 8px;
        align-items: center;
      }

      .hb-status {
        color: #64748b;
        margin: 0;
      }

      @media (max-width: 820px) {
        .hb-row {
          grid-template-columns: 1fr;
        }
        .hb-seq-item {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body class="heart-builder">
    <main class="hb-wrap">
      <section class="hb-card hb-head">
        <h1>Heart Case Builder</h1>
        <p>Skapa hjartstoppsfall med fasta steg: Översikt, Defibrilator, 4H och 4T, Reevaluering &amp; sign-out.</p>
      </section>

      <section class="hb-card">
        <div class="hb-grid">
          <div class="hb-field">
            <label for="caseTitle">Case title</label>
            <input id="caseTitle" type="text" value="FALL-HEART-NEW" />
          </div>
          <div class="hb-field">
            <label for="caseText">Case text</label>
            <textarea id="caseText" placeholder="S/B/A eller fri beskrivning"></textarea>
          </div>
          <div class="hb-defib-settings">
            <h2>Blodgas (valfritt)</h2>
            <label class="hb-check">
              <input id="includeBlodgas" type="checkbox" />
              Inkludera blodgas-box i heart case
            </label>
            <div class="hb-field">
              <label for="blodgasJsonFile">Ladda blodgas JSON-fil (fran blodgas-lab)</label>
              <input id="blodgasJsonFile" type="file" accept=".json,application/json" />
            </div>
            <div class="hb-field">
              <label for="blodgasJson">Blodgas JSON</label>
              <textarea
                id="blodgasJson"
                class="code"
                placeholder='Klistra in JSON fran blodgas-lab här'
              ></textarea>
            </div>
            <p class="hb-status">Om du aktiverar blodgas maste JSON vara giltig.</p>
          </div>
          <label class="hb-check">
            <input id="autoDefibCheck" type="checkbox" checked />
            Automarkera Defibrilator subbox 4 vid lyckad VF-defibrillering
          </label>
          <div class="hb-defib-settings">
            <h2>Defib-inställningar</h2>
            <div class="hb-field">
              <label for="startRhythm">Starttillstand i defib</label>
              <select id="startRhythm">
                <option value="sinus">Sinus</option>
                <option value="vt">VT</option>
                <option value="vfib" selected>VF</option>
                <option value="pea">PEA</option>
                <option value="asystole">Asystole</option>
              </select>
            </div>
            <div class="hb-field">
              <label for="requiredShocks">Antal lyckade stotar innan slutrytm</label>
              <input id="requiredShocks" type="text" inputmode="numeric" value="1" />
            </div>
            <div class="hb-field">
              <label>Rytm efter varje lyckad stot</label>
              <div id="shockPlanHost" class="hb-seq-list" aria-label="Shock sequence editor"></div>
            </div>
            <div class="hb-field">
              <label for="phasePlan">Scenariofaser (valfritt)</label>
              <input
                id="phasePlan"
                type="text"
                placeholder="Exempel: vfib > vfib > sinus eller pea > pea > sinus"
              />
            </div>
            <p class="hb-status">Styr vilken rytm som visas nar defib-overlayn oppnas i caset.</p>
          </div>
        </div>
      </section>

      <section class="hb-card" id="sectionsHost"></section>

      <section class="hb-card">
        <div class="hb-actions">
          <button type="button" class="btn-primary" id="exportBtn">Exportera heart case (.json)</button>
        </div>
        <p class="hb-status" id="status">Klar att exportera.</p>
      </section>
    </main>

    <script>
      const TEMPLATE = [
        {
          id: "oversikt",
          label: "Översikt",
          subboxes: [
            "Identifiera att hjärtstopp är aktuellt",
            "Agera som teamledare och ordinerar adekvata roller.",
            "Studenten förklarar hur man kopplar defibrilatorn",
          ],
        },
        {
          id: "defibrilator",
          label: "Defibrillator",
          subboxes: [
            "Defibrillator uppkopplad.",
            "Studenten känner på pulsen",
            "Studenten analyserar rytmen korrekt",
            "Studenten utför korrekt åtgärd.",
          ],
        },
        {
          id: "h4t4",
          label: "4H och 4T",
          subboxes: [
            "Undersöker tecken på hypoxi",
            "Undersöker tecken på hypovolemi",
            "Undersöker tecken på hyper/hypokalemi",
            "Undersöker tecken på hypotermi",
            "Undersöker tecken på tryckpneumothorax",
            "Undersöker tecken på tamponad",
            "Undersöker tecken på trombos",
            "Undersöker tecken på inTox",
          ],
        },
        {
          id: "reevaluering_signout",
          label: "Reevaluering & sign-out",
          subboxes: [
            "Reevaluerar A-E",
            "Ordinerar adekvat behandling",
            "Ordinerar adekvat vårdnivå",
          ],
        },
      ];

      const sectionsHost = document.getElementById("sectionsHost");
      const exportBtn = document.getElementById("exportBtn");
      const statusEl = document.getElementById("status");
      const caseTitleEl = document.getElementById("caseTitle");
      const caseTextEl = document.getElementById("caseText");
      const includeBlodgasEl = document.getElementById("includeBlodgas");
      const blodgasJsonEl = document.getElementById("blodgasJson");
      const blodgasJsonFileEl = document.getElementById("blodgasJsonFile");
      const autoDefibCheckEl = document.getElementById("autoDefibCheck");
      const startRhythmEl = document.getElementById("startRhythm");
      const requiredShocksEl = document.getElementById("requiredShocks");
      const shockPlanHostEl = document.getElementById("shockPlanHost");
      const phasePlanEl = document.getElementById("phasePlan");
      const RHYTHM_OPTIONS = [
        { value: "sinus", label: "Sinus" },
        { value: "vt", label: "VT" },
        { value: "vfib", label: "VF" },
        { value: "pea", label: "PEA" },
        { value: "asystole", label: "Asystole" },
      ];
      const EVENT_OPTIONS = [
        { value: "", label: "Ingen auto-check" },
        { value: "defib-sequence-complete", label: "Defib-sekvens klar" },
        { value: "defib-success", label: "Defib lyckad (en stot)" },
        { value: "vf-defib-success", label: "VF till sinus lyckad" },
        { value: "rhythm-analysis-correct", label: "Rytmanalys genomford" },
        { value: "pulse-absent", label: "Puls kontrollerad: ingen puls" },
        { value: "pulse-present", label: "Puls kontrollerad: puls finns" },
        { value: "defib-clear-confirmed", label: "Alla klara bekräftat" },
        { value: "drug-adrenalin-correct", label: "Adrenalin korrekt" },
        { value: "drug-cordarone-adrenalin-correct", label: "Cordarone + Adrenalin korrekt" },
      ];

      function safeText(value) {
        return String(value ?? "");
      }

      function slugify(value) {
        return safeText(value)
          .toLowerCase()
          .trim()
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/(^-|-$)/g, "")
          .slice(0, 80);
      }

      function clampShockCount(value) {
        const n = Number.parseInt(String(value || "").trim(), 10);
        if (!Number.isFinite(n)) return 1;
        return Math.max(1, Math.min(10, n));
      }

      function parseOptionalJson(text, label) {
        const raw = safeText(text).trim();
        if (!raw) return null;
        try {
          return JSON.parse(raw);
        } catch (err) {
          throw new Error(`${label} JSON är ogiltig`);
        }
      }

      function readShockPlanValues() {
        if (!shockPlanHostEl) return [];
        return Array.from(shockPlanHostEl.querySelectorAll("select[data-shock-step]"))
          .map((el) => safeText(el.value).trim().toLowerCase())
          .filter(Boolean);
      }

      function readPhasePlanValue() {
        return safeText(phasePlanEl?.value || "")
          .split(/[>,|]/)
          .map((value) => safeText(value).trim().toLowerCase())
          .filter(Boolean)
          .join(">");
      }

      function renderShockPlanEditors() {
        if (!shockPlanHostEl || !requiredShocksEl) return;
        const count = clampShockCount(requiredShocksEl.value);
        requiredShocksEl.value = String(count);
        const prev = readShockPlanValues();
        shockPlanHostEl.replaceChildren();

        for (let i = 0; i < count; i += 1) {
          const row = document.createElement("div");
          row.className = "hb-seq-item";

          const label = document.createElement("label");
          label.textContent = `Efter stot ${i + 1}`;

          const sel = document.createElement("select");
          sel.dataset.shockStep = String(i + 1);
          for (const opt of RHYTHM_OPTIONS) {
            const o = document.createElement("option");
            o.value = opt.value;
            o.textContent = opt.label;
            sel.append(o);
          }

          const defaultValue = i === count - 1 ? "sinus" : "vfib";
          sel.value = prev[i] || defaultValue;

          row.append(label, sel);
          shockPlanHostEl.append(row);
        }
      }

      function makeSubboxEditor(section, index, name) {
        const wrap = document.createElement("article");
        wrap.className = "hb-subbox";
        wrap.dataset.sectionId = section.id;
        wrap.dataset.subIndex = String(index);

        const h3 = document.createElement("h3");
        h3.textContent = `${index + 1}. ${name}`;

        const sayField = document.createElement("div");
        sayField.className = "hb-field";
        const sayLabel = document.createElement("label");
        sayLabel.textContent = "Vad du ska säga";
        const sayInput = document.createElement("textarea");
        sayInput.placeholder = "Vad observatorn ska säga i detta steg";
        sayInput.dataset.field = "specialCase";
        sayField.append(sayLabel, sayInput);

        const doField = document.createElement("div");
        doField.className = "hb-field";
        const doLabel = document.createElement("label");
        doLabel.textContent = "Vad studenten ska göra";
        const doInput = document.createElement("textarea");
        doInput.placeholder = "Förväntad studentåtgärd";
        doInput.dataset.field = "studentAction";
        doField.append(doLabel, doInput);

        const row = document.createElement("div");
        row.className = "hb-row";

        const critWrap = document.createElement("label");
        critWrap.className = "hb-check";
        const critInput = document.createElement("input");
        critInput.type = "checkbox";
        critInput.dataset.field = "critical";
        critWrap.append(critInput, document.createTextNode("Kritisk subbox"));

        const tierField = document.createElement("div");
        tierField.className = "hb-field";
        const tierLabel = document.createElement("label");
        tierLabel.textContent = "Tier";
        const tierSelect = document.createElement("select");
        tierSelect.dataset.field = "tier";
        tierSelect.innerHTML = `
          <option value="basic">basic</option>
          <option value="middle">middle</option>
          <option value="high">high</option>
        `;
        tierField.append(tierLabel, tierSelect);

        row.append(critWrap, tierField);

        const autoField = document.createElement("div");
        autoField.className = "hb-field";
        const autoLabel = document.createElement("label");
        autoLabel.textContent = "Auto-check on event";
        const autoSelect = document.createElement("select");
        autoSelect.dataset.field = "completeOnEvent";
        for (const opt of EVENT_OPTIONS) {
          const o = document.createElement("option");
          o.value = opt.value;
          o.textContent = opt.label;
          autoSelect.append(o);
        }
        autoField.append(autoLabel, autoSelect);

        const autoGradeField = document.createElement("div");
        autoGradeField.className = "hb-field";
        const autoGradeLabel = document.createElement("label");
        autoGradeLabel.textContent = "Auto-grade";
        const autoGradeSelect = document.createElement("select");
        autoGradeSelect.dataset.field = "autoGradeOnEvent";
        autoGradeSelect.innerHTML = `
          <option value="basic">basic</option>
          <option value="middle">middle</option>
          <option value="high">high</option>
        `;
        autoGradeField.append(autoGradeLabel, autoGradeSelect);

        if (section.id === "defibrilator" && index === 3) {
          autoSelect.value = "defib-sequence-complete";
          autoGradeSelect.value = "basic";
        }

        autoSelect.addEventListener("change", () => {
          autoGradeField.style.display = autoSelect.value ? "" : "none";
        });
        autoGradeField.style.display = autoSelect.value ? "" : "none";

        wrap.append(h3, sayField, doField, row, autoField, autoGradeField);
        return wrap;
      }

      function renderTemplateEditors() {
        sectionsHost.replaceChildren();
        for (const section of TEMPLATE) {
          const sec = document.createElement("section");
          sec.className = "hb-section";
          sec.dataset.sectionId = section.id;

          const h2 = document.createElement("h2");
          h2.textContent = section.label;
          sec.append(h2);

          section.subboxes.forEach((name, index) => {
            sec.append(makeSubboxEditor(section, index, name));
          });

          sectionsHost.append(sec);
        }
      }

      function collectCaseData() {
        const title = safeText(caseTitleEl.value).trim() || "FALL-HEART-NEW";
        const caseText = safeText(caseTextEl.value).trim();
        const autoDefib = Boolean(autoDefibCheckEl.checked);
        const rhythm = safeText(startRhythmEl?.value || "vfib").trim() || "vfib";
        const shockCount = clampShockCount(requiredShocksEl?.value || "1");
        const shockPlan = readShockPlanValues().slice(0, shockCount);
        const phasePlan = readPhasePlanValue();
        const includeBlodgas = Boolean(includeBlodgasEl?.checked);
        const blodgasPayload = includeBlodgas
          ? parseOptionalJson(blodgasJsonEl?.value, "Blodgas")
          : null;

        if (includeBlodgas && !blodgasPayload) {
          throw new Error("Blodgas är aktiverad men ingen blodgas-JSON är ifylld");
        }

        const boxes = {};

        for (const section of TEMPLATE) {
          const sectionEl = sectionsHost.querySelector(`.hb-section[data-section-id="${section.id}"]`);
          const subboxes = [];
          if (!sectionEl) continue;

          const editors = Array.from(sectionEl.querySelectorAll(".hb-subbox"));
          for (let i = 0; i < editors.length; i += 1) {
            const editor = editors[i];
            const specialCase = safeText(editor.querySelector('[data-field="specialCase"]')?.value).trim();
            const studentAction = safeText(editor.querySelector('[data-field="studentAction"]')?.value).trim();
            const critical = Boolean(editor.querySelector('[data-field="critical"]')?.checked);
            const tier = safeText(editor.querySelector('[data-field="tier"]')?.value).trim() || "basic";
            const completeOnEvent = safeText(editor.querySelector('[data-field="completeOnEvent"]')?.value).trim();
            const autoGradeOnEvent = safeText(editor.querySelector('[data-field="autoGradeOnEvent"]')?.value).trim() || "basic";

            const sub = {
              name: section.subboxes[i],
              studentAction,
              specialCase,
              tiers: [tier],
              critical,
            };

            if (section.id === "defibrilator" && i === 0) {
              sub.openCustomEmbed = true;
              sub.openCustomEmbedLabel = "Visa defibrillator för studenten";
            }

            if (completeOnEvent) {
              sub.completeOnEvent = completeOnEvent;
              sub.autoGradeOnEvent = autoGradeOnEvent;
            } else if (section.id === "defibrilator" && i === 3 && autoDefib) {
              sub.completeOnEvent = "defib-sequence-complete";
              sub.autoGradeOnEvent = "basic";
            }

            subboxes.push(sub);
          }

          const box = {
            label: section.label.toLowerCase(),
            image: null,
            ecg: null,
            blodgas: null,
            subboxes,
          };

          if (section.id === "defibrilator") {
            box.customEmbed = {
              type: "iframe",
              src:
                `./defib-workspace.html?embed=case&rhythm=${encodeURIComponent(rhythm)}` +
                `&shockPlan=${encodeURIComponent(shockPlan.join(","))}` +
                (phasePlan ? `&phasePlan=${encodeURIComponent(phasePlan)}` : ""),
              title: "Defib Workspace",
              height: 960,
              display: "overlay",
            };
          }

          boxes[section.id] = box;
        }

        if (includeBlodgas && blodgasPayload) {
          boxes.blodgas = {
            label: "blodgas",
            image: null,
            ecg: null,
            blodgas: blodgasPayload,
            subboxes: [
              {
                name: "Tolkar syra-basrubbning",
                studentAction: "",
                specialCase: "",
                tiers: ["basic"],
                critical: false,
              },
              {
                name: "Tolkar elektrolyter",
                studentAction: "",
                specialCase: "",
                tiers: ["basic"],
                critical: false,
              },
              {
                name: "Tolkar laktat och metabol påverkan",
                studentAction: "",
                specialCase: "",
                tiers: ["basic"],
                critical: false,
              },
            ],
          };
        }

        return {
          schemaVersion: 3,
          title,
          caseText,
          boxes,
        };
      }

      function downloadJson(filename, data) {
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        document.body.append(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      }

      exportBtn.addEventListener("click", () => {
        try {
          const payload = collectCaseData();
          const filename = `case-${slugify(payload.title) || "fall-heart"}.json`;
          downloadJson(filename, payload);
          statusEl.textContent = `Exporterade ${filename}. Lagg filen i cases/.`;
        } catch (err) {
          statusEl.textContent = `Kunde inte exportera: ${safeText(err && err.message)}`;
        }
      });

      if (requiredShocksEl) {
        requiredShocksEl.addEventListener("change", renderShockPlanEditors);
        requiredShocksEl.addEventListener("input", () => {
          const raw = safeText(requiredShocksEl.value).replace(/[^0-9]/g, "");
          requiredShocksEl.value = raw;
        });
      }

      if (blodgasJsonFileEl && blodgasJsonEl) {
        blodgasJsonFileEl.addEventListener("change", async (event) => {
          const file = event.target && event.target.files ? event.target.files[0] : null;
          if (!file) return;
          try {
            const text = await file.text();
            parseOptionalJson(text, "Blodgas");
            blodgasJsonEl.value = text;
            if (includeBlodgasEl) includeBlodgasEl.checked = true;
            statusEl.textContent = `Blodgas JSON laddad: ${safeText(file.name)}`;
          } catch (err) {
            statusEl.textContent = `Kunde inte läsa blodgas JSON: ${safeText(err && err.message)}`;
          } finally {
            event.target.value = "";
          }
        });
      }

      renderTemplateEditors();
      renderShockPlanEditors();
    </script>
  </body>
</html>
